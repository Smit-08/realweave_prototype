services:
  # 1. The FastAPI Backend + Static Frontend
  - type: web
    name: realweave-mvp
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=. uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: realweave-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: realweave-db
    plan: free
