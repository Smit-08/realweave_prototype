<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | RealWeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-sidebar);
            overflow: auto;
            min-height: 100vh;
        }
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 3rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-purple));
            border-radius: 12px;
            display: inline-grid;
            place-items: center;
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(0, 209, 255, 0.3);
        }
        .login-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .login-header p { color: var(--text-dim); font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="login-container animate-scale">
        <div class="login-header">
            <div class="login-logo"><i class="fas fa-cube"></i></div>
            <h2>Create Account</h2>
            <p>Join the future of supply chain intelligence</p>
        </div>

        <form id="signup-form">
            <div class="input-group">
                <label class="input-label" for="full_name">Full Name</label>
                <input type="text" id="full_name" class="form-input" placeholder="Alex Rivera" required>
            </div>
            <div class="input-group">
                <label class="input-label" for="email">Email address</label>
                <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
            </div>
            <div class="input-group">
                <label class="input-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; justify-content: center; height: 48px;">
                Create Account
            </button>
        </form>

        <p style="margin-top: 2.5rem; text-align: center; font-size: 0.9rem; color: var(--text-dim);">
            Already have an account? <a href="login.html" style="color: var(--accent-glow); text-decoration: none; font-weight: 600; margin-left: 5px;">Sign in</a>
        </p>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const full_name = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            try {
                btn.innerText = 'Creating account...';
                btn.disabled = true;

                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert('Account created! Please sign in.');
                    window.location.href = '/static/login.html';
                } else {
                    alert(data.detail || 'Signup failed');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
