<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | RealWeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-sidebar);
            overflow: auto;
        }
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 3rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: inline-grid;
            place-items: center;
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        .login-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .social-btn {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.625rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: var(--transition);
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
    </style>
</head>
<body>
    <div class="login-container animate-scale">
        <div class="login-header">
            <div class="login-logo"><i class="fas fa-cube"></i></div>
            <h2>Welcome back</h2>
            <p>Enter your credentials to access your dashboard</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
            <button class="btn btn-secondary btn-sm" style="justify-content: center;">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="btn btn-secondary btn-sm" style="justify-content: center;">
                <i class="fab fa-github"></i> GitHub
            </button>
        </div>

        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
            <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
            <span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;">OR CONTINUE WITH EMAIL</span>
            <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
        </div>

        <form id="login-form">
            <div class="input-group">
                <label class="input-label" for="email">Email address</label>
                <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
            </div>
            
            <div class="input-group">
                <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 2px;">
                    <label class="input-label" for="password" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.75rem; color: var(--accent-glow); text-decoration: none; opacity: 0.8; transition: 0.2s;">Forgot password?</a>
                </div>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; justify-content: center; height: 48px;">
                Sign in to Dashboard
            </button>
        </form>

        <p style="margin-top: 2.5rem; text-align: center; font-size: 0.9rem; color: var(--text-dim);">
            Don't have an account? <a href="/signup" style="color: var(--accent-glow); text-decoration: none; font-weight: 600; margin-left: 5px;">Sign up</a>
        </p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            try {
                btn.innerText = 'Authenticating...';
                btn.disabled = true;

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    // Store user data
                    localStorage.setItem('ss_user', JSON.stringify(data.user));
                    localStorage.setItem('ss_token', data.token);
                    
                    window.location.href = '/';
                } else {
                    alert(data.detail || 'Invalid credentials');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
